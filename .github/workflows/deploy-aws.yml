name: Deploy to AWS

on:
  push:
    branches:
      - main
      - cicd
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production   # 使用此 Environment 的 variables/secrets；可改為 staging 等
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build API docs
        run: npm run docs:build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::104840775722:role/github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: election/api-election
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create new Launch Template version
        env:
          LAUNCH_TEMPLATE_NAME: ${{ vars.LAUNCH_TEMPLATE_NAME }}
          NEW_IMAGE: ${{ steps.build-image.outputs.image }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          APP_PORT: ${{ vars.APP_PORT || '3000' }}
          SECRET_ID: '${{ vars.SECRET_ID }}'
        run: |
          CURRENT=$(aws ec2 describe-launch-templates --launch-template-names "$LAUNCH_TEMPLATE_NAME" --query 'LaunchTemplates[0].LatestVersionNumber' --output text)
          USER_DATA=$(printf '%s' "#!/bin/bash
          set -e
          export IMAGE=\"$NEW_IMAGE\"
          export ECR_REGISTRY=\"$ECR_REGISTRY\"
          export CONTAINER_NAME=\"api-election\"
          export APP_PORT=\"$APP_PORT\"
          export AWS_REGION=\"${{ env.AWS_REGION }}\"
          export SECRET_ID=\"$SECRET_ID\"
          export ENV_DIR=\"/opt/api-election\"
          export ENV_FILE=\"\$ENV_DIR/.env\"
          mkdir -p \"\$ENV_DIR\"
          aws ecr get-login-password --region \"\$AWS_REGION\" | docker login --username AWS --password-stdin \"\$ECR_REGISTRY\"
          docker pull \$IMAGE
          docker stop \$CONTAINER_NAME 2>/dev/null || true
          docker rm \$CONTAINER_NAME 2>/dev/null || true
          aws secretsmanager get-secret-value --secret-id \"\$SECRET_ID\" --region \"\$AWS_REGION\" --query SecretString --output text > \"\$ENV_FILE\"
          chmod 600 \"\$ENV_FILE\"
          docker run -d --name \$CONTAINER_NAME --restart unless-stopped -p \$APP_PORT:3000 --env-file \"\$ENV_FILE\" -v \"\$ENV_FILE:/app/.env:ro\" \$IMAGE
          ")
          USER_DATA_B64=$(echo -n "$USER_DATA" | base64 -w0)
          NEW_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-name "$LAUNCH_TEMPLATE_NAME" \
            --source-version "$CURRENT" \
            --launch-template-data "{\"UserData\":\"$USER_DATA_B64\"}" \
            --query 'LaunchTemplateVersion.VersionNumber' --output text)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Created Launch Template version: $NEW_VERSION"
          aws ec2 modify-launch-template \
            --launch-template-name "$LAUNCH_TEMPLATE_NAME" \
            --default-version "$NEW_VERSION"
          echo "Set Launch Template default version to: $NEW_VERSION"

      - name: Start ASG Instances Rolling Update
        env:
          ASG_NAME: ${{ vars.ASG_NAME }}
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}'
          echo "Instance Refresh started. New instances will use the latest Launch Template version."
