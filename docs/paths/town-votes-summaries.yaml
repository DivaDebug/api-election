get:
  tags:
    - Votes Summary
  summary: Get town votes summaries
  parameters:
    - name: year
      in: query
      required: true
      schema:
        type: integer
      example: 2024
    - name: type
      in: query
      required: true
      schema:
        type: string
        enum:
          - mayor
      example: mayor
    - name: countyCode
      in: query
      required: false
      schema:
        type: string
      example: 63000
    - name: candidateLimit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      example: 3
  responses:
    '200':
      description: Town votes summaries.
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                type: object
                properties:
                  errorCode:
                    nullable: true
                    type: string
                    example: null
                required:
                  - errorCode
              data:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                      example: 67d9b32559851826b714f96b
                    year:
                      type: integer
                      example: 2024
                    type:
                      type: string
                      enum:
                        - mayor
                    countyCode:
                      type: string
                      example: 63000
                    townName:
                      type: string
                      example: Zhongzheng District
                    townCode:
                      type: string
                      example: 6300100
                    candidates:
                      type: array
                      items:
                        $ref: '../components/schemas/CandidateSummary.yaml'
                  required:
                    - _id
                    - year
                    - type
                    - countyCode
                    - townName
                    - townCode
                    - candidates
            required:
              - meta
              - data
          examples:
            '200':
              value:
                $ref: '../examples/town-votes-summaries/response/post/200.json'
